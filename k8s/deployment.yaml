apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-homepage
  namespace: my-homepage
  labels:
    app: my-homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-homepage
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: my-homepage
    spec:
      serviceAccountName: infra-shared
      containers:
        - name: my-homepage
          image: romainecr.azurecr.io/my-homepage:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 20m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3

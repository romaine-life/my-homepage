apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-homepage
  namespace: my-homepage
spec:
  hostnames:
    - homepage.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: my-homepage
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: my-homepage
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

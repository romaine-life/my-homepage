<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="fzt-terminal.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="ambience-canvas" data-ambience></canvas>
  <div id="app">
    <div id="toolbar">
      <button id="save-btn" class="hidden">Save</button>
      <button id="cancel-btn" class="hidden">Cancel</button>
    </div>
    <div id="api-error" class="hidden"></div>
    <div id="main-panel" class="fzt-terminal-window">
      <pre id="fzh-terminal" tabindex="0"></pre>
      <div id="tree"></div>
    </div>
  </div>

  <div id="local-badge" class="hidden">LOCAL</div>

  <script src="wasm_exec.js"></script>
  <script src="ambience-sim.js"></script>
  <script src="ambience-client.js"></script>
  <script type="module" src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>

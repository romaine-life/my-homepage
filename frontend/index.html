<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Account widget (top-left) -->
  <div id="user-bar" class="hidden">
    <button id="user-btn">
      <img id="user-avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="" />
      <span id="user-email"></span>
      <span class="user-chevron">&#9662;</span>
    </button>
    <script>
      (function() {
        var d = localStorage.getItem("user_display");
        if (d) { d = JSON.parse(d); }
        var av = document.getElementById("user-avatar");
        var em = document.getElementById("user-email");
        if (d && d.avatar) av.src = d.avatar;
        if (d && d.showEmail && d.email) {
          em.textContent = d.email;
        } else {
          em.textContent = (d && d.name) ? d.name : "Anonymous";
        }
      })();
    </script>
    <div id="account-dropdown" class="hidden">
      <div id="login-picker">
        <button class="login-provider" data-provider="github">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
        <button class="login-provider" data-provider="google">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="login-provider" data-provider="microsoft">
          <svg viewBox="0 0 21 21" width="18" height="18"><rect x="0" y="0" width="10" height="10" fill="#f25022"/><rect x="11" y="0" width="10" height="10" fill="#7fba00"/><rect x="0" y="11" width="10" height="10" fill="#00a4ef"/><rect x="11" y="11" width="10" height="10" fill="#ffb900"/></svg>
          Microsoft
        </button>
        <button class="login-provider" data-provider="apple" id="apple-login-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
        <div class="login-separator">or</div>
        <form id="local-login-form">
          <input type="text" id="local-username" placeholder="Username or email" autocomplete="username" required />
          <input type="password" id="local-password" placeholder="Password" autocomplete="current-password" required />
          <button type="submit" class="login-provider local-login-btn">Sign in</button>
          <div id="local-login-error" class="hidden"></div>
        </form>
      </div>

      <!-- Profile picture (local users only) -->
      <div id="profile-section" class="hidden">
        <div id="profile-picture-section">
          <label for="profile-picture-input" class="profile-picture-label">Change picture</label>
          <input type="file" id="profile-picture-input" accept="image/jpeg,image/png" class="hidden" />
          <button id="remove-picture-btn" class="hidden">Remove picture</button>
        </div>
      </div>

      <!-- Display name toggle (OAuth users only) -->
      <div id="display-toggle-section" class="hidden">
        <button id="display-toggle-btn">Show email</button>
      </div>

      <!-- Admin: create local accounts -->
      <div id="admin-section" class="hidden">
        <div class="admin-header">Create account</div>
        <form id="create-account-form">
          <input type="text" id="new-username" placeholder="Username or email" required />
          <input type="password" id="new-password" placeholder="Password" required />
          <input type="text" id="new-display-name" placeholder="Display name" />
          <button type="submit">Create</button>
          <div id="create-account-msg" class="hidden"></div>
        </form>
      </div>

      <button id="logout-btn" class="hidden">Log out</button>
    </div>
  </div>

  <!-- Loading state -->
  <div id="loading" class="hidden">Loading…</div>

  <!-- Main app (hidden until authenticated) -->
  <div id="app" class="hidden">
    <div id="toolbar">
      <button id="toggle-all">+</button>
      <button id="edit-btn" title="Edit">🔧</button>
      <button id="save-btn" class="hidden">Save</button>
      <button id="cancel-btn" class="hidden">Cancel</button>
      <button id="import-export-btn" title="Import/Export">⇅</button>
      <button id="yaml-save-btn" class="hidden" title="Import YAML">💾</button>
    </div>
    <div id="api-error" class="hidden"></div>
    <div id="tree"></div>
  </div>

  <div id="local-badge" class="hidden">LOCAL</div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
  <script type="module" src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>

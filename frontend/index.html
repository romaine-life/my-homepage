<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="fzt-terminal.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    Ambient background, subscribed to ambience's DEFAULT rotating world (bare
    /events + /snapshot). The runtime is VENDORED, version-pinned in
    frontend/ambience/ (see scripts/vendor-ambience.mjs) and served from our own
    origin — only the SSE stream points at ambience. The data-ambience-*-url
    overrides load the WASM/runtime from those vendored copies instead of
    re-fetching ambience's origin at runtime, which is what kept the old frozen
    client desyncing against the live 60 Hz / 320x180 authority.
  -->
  <canvas
    id="ambience-canvas"
    data-ambience
    data-ambience-wasm-url="/ambience/ambience.wasm"
    data-ambience-wasm-exec-url="/ambience/wasm_exec.js"
    data-ambience-runtime-url="/ambience/wasm_runtime.js"
  ></canvas>
  <script>
    (function () {
      try {
        if (localStorage.getItem("homepage_ambience_background") !== "off") return;
        document.documentElement.classList.add("ambience-disabled");
        document.getElementById("ambience-canvas").removeAttribute("data-ambience");
      } catch (_) {
        // If storage is unavailable, keep the default ambience behavior.
      }
    })();
  </script>
  <div id="app">
    <div id="toolbar">
      <button id="save-btn" class="hidden">Save</button>
      <button id="cancel-btn" class="hidden">Cancel</button>
    </div>
    <div id="api-error" class="hidden"></div>
    <div id="main-panel" class="fzt-terminal-window">
      <pre id="fzh-terminal" tabindex="0"></pre>
      <div id="tree"></div>
    </div>
  </div>

  <div id="local-badge" class="hidden">LOCAL</div>

  <script src="wasm_exec.js"></script>
  <!-- Vendored ambience client (see frontend/ambience/, scripts/vendor-ambience.mjs).
       sim.js must precede client.js: client.js binds to the AmbienceSim global. -->
  <script src="/ambience/sim.js"></script>
  <script src="/ambience/client.js"></script>
  <script type="module" src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>

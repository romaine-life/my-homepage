name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.git_ref != ''
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${INPUT_REF} -> ${full_sha}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download fzt assets from latest fzt-browser release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo nelsong6/fzt-browser \
            --pattern "fzt.wasm" \
            --pattern "fzt-terminal.js" \
            --pattern "fzt-terminal.css" \
            --pattern "fzt-web.js" \
            --dir frontend --clobber
          printf '{"fztBrowser":"docker-build-check","sha":"%s","deployedAt":"%s"}\n' \
            "$(git rev-parse --short=7 HEAD)" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > frontend/version.json

      - name: Generate frontend/config.js
        env:
          HOMEPAGE_VERSION: docker-build-check
        run: |
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

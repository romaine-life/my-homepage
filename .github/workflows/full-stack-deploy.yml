name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  repository_dispatch:
    types: [fzt-updated]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  STATIC_WEB_APP_NAME: homepage-app
  RESOURCE_GROUP_NAME: homepage-rg

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download fzt assets from latest release
        id: fzt-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo nelsong6/fzt-terminal --pattern "fzt.wasm" --pattern "fzt-terminal.js" --pattern "fzt-terminal.css" --pattern "fzt-web.js" --dir frontend --clobber
          FZT_VERSION=$(gh release view --repo nelsong6/fzt-terminal --json tagName -q '.tagName')
          echo "fzt_version=$FZT_VERSION" >> $GITHUB_OUTPUT
          echo "{\"fztTerminal\":\"$FZT_VERSION\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > frontend/version.json
          echo "Wrote version.json: fzt-terminal $FZT_VERSION"

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Get Bypass API URL
        id: bypass-url
        run: |
          FQDN=$(az containerapp show \
            --name shared-api \
            --resource-group infra \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "api_bypass_url=https://$FQDN/homepage" >> $GITHUB_OUTPUT

      - name: Generate Config
        run: |
          export API_URL="https://api.romaine.life/homepage"
          export API_BYPASS_URL="${{ steps.bypass-url.outputs.api_bypass_url }}"
          export MICROSOFT_CLIENT_ID="${{ vars.MICROSOFT_CLIENT_ID }}"
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Get Static Web App Token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ env.STATIC_WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: ""
          skip_app_build: true

      - name: Verify deployment and report version
        env:
          FZT_VERSION: ${{ steps.fzt-version.outputs.fzt_version }}
        run: |
          echo "Verifying version.json is live..."
          for i in $(seq 1 30); do
            LIVE=$(curl -s https://homepage.romaine.life/version.json 2>/dev/null || echo "{}")
            if echo "$LIVE" | grep -q "$FZT_VERSION"; then
              echo "Version verified: $FZT_VERSION"
              curl -s -X POST https://api.romaine.life/ci/deployed \
                -H "Content-Type: application/json" \
                -d "{\"site\":\"homepage.romaine.life\",\"repo\":\"my-homepage\",\"versions\":$LIVE}"
              echo "Reported to CI dashboard"
              exit 0
            fi
            echo "Attempt $i: waiting for CDN... (got: $LIVE)"
            sleep 5
          done
          echo "::warning::Version verification timed out — dashboard not updated"

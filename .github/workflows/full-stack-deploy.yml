name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  repository_dispatch:
    types: [fzt-updated]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  STATIC_WEB_APP_NAME: homepage-app
  RESOURCE_GROUP_NAME: homepage-rg

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download fzt assets from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --repo nelsong6/fzt --pattern "fzt.wasm" --pattern "fzt-terminal.js" --dir frontend --clobber

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Get Bypass API URL
        id: bypass-url
        run: |
          FQDN=$(az containerapp show \
            --name shared-api \
            --resource-group infra \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "api_bypass_url=https://$FQDN/homepage" >> $GITHUB_OUTPUT

      - name: Generate Config
        run: |
          export API_URL="https://api.romaine.life/homepage"
          export API_BYPASS_URL="${{ steps.bypass-url.outputs.api_bypass_url }}"
          export MICROSOFT_CLIENT_ID="${{ vars.MICROSOFT_CLIENT_ID }}"
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Get Static Web App Token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ env.STATIC_WEB_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: ""
          skip_app_build: true

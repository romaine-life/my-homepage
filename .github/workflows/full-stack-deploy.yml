name: Phase 3 - CD Deploy

on:
  repository_dispatch:
    types: [spacelift_infra_ready]
  workflow_dispatch:
    inputs:
      commit_sha:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/homepage-api
  SPACELIFT_API_KEY_ENDPOINT: 'https://nelsong6.app.us.spacelift.io'
  # Handle both Spacelift trigger and manual trigger
  TARGET_SHA: ${{ github.event.client_payload.commit_sha || inputs.commit_sha }}

jobs:
  # ============================================================================
  # 3b. BACKEND PUSH
  # ============================================================================
  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@v1

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch Spacelift Credentials
        run: |
          KV_ID=$(az keyvault secret show --vault-name "${{ vars.KEY_VAULT_NAME }}" --name spacelift-api-key-id --query value -o tsv | tr -d '\r\n')
          echo "::add-mask::$KV_ID"
          echo "SPACELIFT_API_KEY_ID=$KV_ID" >> $GITHUB_ENV

          KV_SECRET=$(az keyvault secret show --vault-name "${{ vars.KEY_VAULT_NAME }}" --name spacelift-api-key-secret --query value -o tsv | tr -d '\r\n')
          echo "::add-mask::$KV_SECRET"
          echo "SPACELIFT_API_KEY_SECRET=$KV_SECRET" >> $GITHUB_ENV

      - name: Fetch Backend Outputs
        run: |
          APP_STACK_ID=${GITHUB_REPOSITORY#*/}
          APP_OUTPUTS=$(spacectl stack outputs --id "$APP_STACK_ID" --output json)
          echo "CONTAINER_APP_NAME=$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "container_app_name") | .value | fromjson')" >> $GITHUB_ENV
          echo "RESOURCE_GROUP_NAME=$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "resource_group_name") | .value | fromjson')" >> $GITHUB_ENV

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TARGET_SHA }}

  # ============================================================================
  # 3a. FRONTEND PUSH
  # ============================================================================
  deploy-frontend:
    name: Deploy Vanilla JS Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Install spacectl
        uses: spacelift-io/setup-spacectl@v1

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch Spacelift Credentials
        run: |
          KV_ID=$(az keyvault secret show --vault-name "${{ vars.KEY_VAULT_NAME }}" --name spacelift-api-key-id --query value -o tsv | tr -d '\r\n')
          echo "::add-mask::$KV_ID"
          echo "SPACELIFT_API_KEY_ID=$KV_ID" >> $GITHUB_ENV

          KV_SECRET=$(az keyvault secret show --vault-name "${{ vars.KEY_VAULT_NAME }}" --name spacelift-api-key-secret --query value -o tsv | tr -d '\r\n')
          echo "::add-mask::$KV_SECRET"
          echo "SPACELIFT_API_KEY_SECRET=$KV_SECRET" >> $GITHUB_ENV

      - name: Fetch Outputs & Generate Config
        run: |
          APP_STACK_ID=${GITHUB_REPOSITORY#*/}

          APP_OUTPUTS=$(spacectl stack outputs --id "$APP_STACK_ID" --output json)
          export API_URL=$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "backend_api_url") | .value | fromjson')
          export API_BYPASS_URL="https://$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "container_app_default_fqdn") | .value | fromjson')"

          echo "STATIC_WEB_APP_NAME=$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "static_web_app_name") | .value | fromjson')" >> $GITHUB_ENV
          echo "RESOURCE_GROUP_NAME=$(echo "$APP_OUTPUTS" | jq -r '.[] | select(.id == "resource_group_name") | .value | fromjson')" >> $GITHUB_ENV

          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Get Static Web App Token
        id: static-web-app-token
        run: |
          DEPLOYMENT_TOKEN=$(az staticwebapp secrets list --name ${{ env.STATIC_WEB_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP_NAME }} --query "properties.apiKey" -o tsv)
          echo "::add-mask::$DEPLOYMENT_TOKEN"
          echo "deployment_token=$DEPLOYMENT_TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.static-web-app-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"
          output_location: ""
          skip_app_build: true

name: Publish Routes Package

on:
  push:
    branches: ["main"]
    paths: ["packages/routes/**"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        id: publish
        working-directory: packages/routes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY_VERSION=$(npm view @nelsong6/my-homepage-routes version 2>/dev/null || echo "0.0.0")
          npm version "$REGISTRY_VERSION" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version
          npm publish
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Trigger API rebuild
        run: |
          PAT=$(az keyvault secret show --vault-name ${{ vars.KEY_VAULT_NAME }} --name github-pat --query value -o tsv)
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/nelsong6/api/dispatches \
            -d '{"event_type":"dependency-updated","client_payload":{"package":"@nelsong6/my-homepage-routes","version":"${{ steps.publish.outputs.version }}"}}'

      - name: Report published version to CI dashboard
        run: |
          curl -sf -X POST https://api.romaine.life/ci/published \
            -H "Content-Type: application/json" \
            -d '{"repoName":"my-homepage","version":"${{ steps.publish.outputs.version }}"}' \
            || echo "Version report failed (non-fatal)"

name: Publish Routes Package

on:
  push:
    branches: ["main"]
    paths: ["packages/routes/**"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        id: publish
        working-directory: packages/routes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY_VERSION=$(npm view @nelsong6/my-homepage-routes version 2>/dev/null || echo "0.0.0")
          npm version "$REGISTRY_VERSION" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version
          npm publish
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Trigger API rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: nelsong6/api
          event-type: dependency-updated
          client-payload: '{"package": "@nelsong6/my-homepage-routes", "version": "${{ steps.publish.outputs.version }}"}'

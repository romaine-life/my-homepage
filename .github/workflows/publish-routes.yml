name: Publish Routes Package

on:
  workflow_run:
    workflows: ["Infrastructure"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check if routes changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD -- packages/routes/)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/routes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm version patch --no-git-tag-version
          npm publish

      - name: Trigger API rebuild
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: nelsong6/api
          event-type: dependency-updated
          client-payload: '{"package": "@nelsong6/my-homepage-routes"}'

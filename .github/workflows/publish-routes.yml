name: Publish Routes Package

on:
  workflow_run:
    workflows: ["Infrastructure"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Check if publish is needed
        id: check
        working-directory: packages/routes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL_TARBALL=$(npm pack --dry-run --json 2>/dev/null | jq -r '.[0].shasum')
          PUBLISHED_TARBALL=$(npm view @nelsong6/my-homepage-routes dist.shasum 2>/dev/null || echo "none")
          if [ "$LOCAL_TARBALL" = "$PUBLISHED_TARBALL" ]; then
            echo "No changes to publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Changes detected, publishing"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip != 'true'
        working-directory: packages/routes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY_VERSION=$(npm view @nelsong6/my-homepage-routes version 2>/dev/null || echo "0.0.0")
          npm version "$REGISTRY_VERSION" --no-git-tag-version --allow-same-version
          npm version patch --no-git-tag-version
          npm publish

      - name: Trigger API rebuild
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: nelsong6/api
          event-type: dependency-updated
          client-payload: '{"package": "@nelsong6/my-homepage-routes"}'

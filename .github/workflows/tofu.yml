name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths: ['tofu/**']
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  tofu:
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-plan-apply-template.yml@main
    with:
      working_directory: tofu
      backend_storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      backend_key: my-homepage.tfstate
    secrets: inherit

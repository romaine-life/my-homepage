name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            file: Dockerfile
            context: .
            cache-ref: romainecr.azurecr.io/my-homepage-build-cache:app
            image-repo: my-homepage
            fingerprint-paths: Dockerfile .dockerignore backend/package.json backend/package-lock.json backend/server.js frontend/PerfectDOSVGA437.ttf frontend/SymbolsNerdFontMono-Regular.ttf frontend/ambience frontend/auth.js frontend/bookmarks-baked.json frontend/config.js frontend/favicon.ico frontend/fzh-terminal.js frontend/fzt-terminal.css frontend/fzt-terminal.js frontend/fzt-web.js frontend/fzt.wasm frontend/generate-config.sh frontend/index.html frontend/package.json frontend/package-lock.json frontend/script.js frontend/style.css frontend/sw.js frontend/version.json frontend/wasm_exec.js scripts/image-fingerprint.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve requested ref
        if: github.event_name == 'workflow_dispatch' && inputs.git_ref != ''
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
            full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${INPUT_REF} -> ${full_sha}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Azure Login (OIDC)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: az acr login --name romainecr

      - name: Download fzt assets from latest fzt-browser release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo romaine-life/fzt-browser \
            --pattern "fzt.wasm" \
            --pattern "fzt-terminal.js" \
            --pattern "fzt-terminal.css" \
            --pattern "fzt-web.js" \
            --dir frontend --clobber
          printf '{"fztBrowser":"docker-build-check","sha":"%s","deployedAt":"%s"}\n' \
            "$(git rev-parse --short=7 HEAD)" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > frontend/version.json

      - name: Generate frontend/config.js
        env:
          HOMEPAGE_VERSION: docker-build-check
        run: |
          chmod +x ./frontend/generate-config.sh
          ./frontend/generate-config.sh

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image '${{ matrix.name }}' \
            --dockerfile '${{ matrix.file }}' \
            --context '${{ matrix.context }}' \
            --paths '${{ matrix.fingerprint-paths }}'

      - name: Check ACR candidate image
        id: candidate
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${{ matrix.image-repo }}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "hit=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable candidate image: romainecr.azurecr.io/${{ matrix.image-repo }}:${tag}"
          else
            echo "hit=false" >>"${GITHUB_OUTPUT}"
            echo "No candidate image found for ${{ matrix.name }} fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push candidate image
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.candidate.outputs.hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: romainecr.azurecr.io/${{ matrix.image-repo }}:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: |
            type=registry,ref=${{ matrix.cache-ref }}
            type=gha,scope=${{ matrix.name }}
          cache-to: |
            type=registry,ref=${{ matrix.cache-ref }},mode=max
            type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build image without pushing
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
